<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f14">
  <meta name="description" content="AirPaste — Send text from your phone to your computer instantly.">
  <title>AirPaste — Cloud Clipboard</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>
  <div class="app-container">
    <!-- Ambient background blobs -->
    <div class="ambient-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="8" y="2" width="8" height="4" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 11v6M9 14l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="logo-text">AirPaste</h1>
      </div>
      <p class="tagline">Send text to your computer</p>
    </header>

    <!-- Connection Status -->
    <div id="connection-bar" class="connection-bar">
      <div class="connection-dot"></div>
      <span id="connection-text" class="connection-text">Connected to room</span>
      <span id="connection-room-id" class="connection-room-id">----</span>
    </div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- No Room Warning -->
      <div id="no-room-section" class="no-room-section hidden">
        <div class="no-room-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <h2 class="no-room-title">No Room Connected</h2>
        <p class="no-room-desc">Scan the QR code from the AirPaste extension on your computer to connect.</p>
      </div>

      <!-- Text Input Section -->
      <div id="input-section" class="input-section hidden">
        <label for="text-input" class="input-label">Your text or link</label>
        <div class="textarea-wrapper">
          <textarea
            id="text-input"
            class="text-input"
            placeholder="Paste or type anything here..."
            rows="6"
            maxlength="10000"
          ></textarea>
          <span id="char-count" class="char-count">0 / 10,000</span>
        </div>

        <!-- Send Button -->
        <button id="send-btn" class="send-btn" disabled>
          <span class="send-btn-content">
            <svg class="send-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            <span id="send-btn-text">Send to Computer</span>
          </span>
          <div class="send-btn-loader hidden" id="send-btn-loader">
            <div class="spinner"></div>
          </div>
        </button>
      </div>
    </main>

    <!-- Status Toast -->
    <div id="toast" class="toast hidden">
      <span id="toast-icon" class="toast-icon">✓</span>
      <span id="toast-text" class="toast-text">Sent successfully!</span>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>AirPaste &mdash; Cloud Clipboard</p>
    </footer>
  </div>

  <script src="dist/app.bundle.js"></script>
</body>
</html>
