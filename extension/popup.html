<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirPaste</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="8" y="2" width="8" height="4" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 11v6M9 14l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="logo-text">AirPaste</h1>
      </div>
      <p class="tagline">Scan QR · Send Text · Done</p>
    </header>

    <!-- QR Code Section -->
    <section class="qr-section">
      <div id="qr-container" class="qr-container">
        <!-- QR code canvas will be rendered here -->
      </div>
      <div class="room-info">
        <span class="room-label">Room</span>
        <span id="room-id" class="room-id">----</span>
      </div>
    </section>

    <!-- Status Section -->
    <section id="status-section" class="status-section status-waiting">
      <div class="status-icon" id="status-icon">
        <div class="pulse-ring"></div>
        <div class="pulse-dot"></div>
      </div>
      <p id="status-text" class="status-text">Waiting for connection...</p>
    </section>

    <!-- Received Text Preview -->
    <section id="received-section" class="received-section hidden">
      <div class="received-header">
        <span class="received-label">Received</span>
        <div class="received-actions">
          <button id="open-link-btn" class="action-btn open-link-btn hidden" title="Open in browser">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            <span>Open</span>
          </button>
          <button id="copy-again-btn" class="action-btn copy-again-btn" title="Copy again">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <p id="received-text" class="received-text"></p>
    </section>

    <!-- Send to Phone Section -->
    <section class="send-section">
      <div class="send-section-header">
        <span class="send-section-label">Send to Phone</span>
      </div>
      <div class="send-input-wrapper">
        <input
          id="send-to-mobile-input"
          class="send-to-mobile-input"
          type="text"
          placeholder="Type text or paste a link..."
          maxlength="10000"
        />
        <button id="send-to-mobile-btn" class="send-to-mobile-btn" title="Send to phone" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- History Section -->
    <section class="history-section">
      <button id="history-toggle-btn" class="history-toggle-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>History</span>
        <span id="history-count" class="history-count">0</span>
        <svg id="history-chevron" class="history-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div id="history-panel" class="history-panel hidden">
        <div id="history-list" class="history-list">
          <!-- History items rendered here -->
        </div>
        <button id="history-clear-btn" class="history-clear-btn hidden">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          <span>Clear All</span>
        </button>
        <p id="history-empty" class="history-empty">No history yet</p>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <button id="new-room-btn" class="new-room-btn" title="Generate new room">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        <span>New Room</span>
      </button>
    </footer>
  </div>

  <script src="dist/popup.bundle.js"></script>
</body>
</html>
